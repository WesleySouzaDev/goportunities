        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/opening.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/opening.ErrorResponse'
      summary: Delete opening
      tags:
      - Openings
    get:
